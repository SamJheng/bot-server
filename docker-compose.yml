services:
  openclaw-init:
    image: alpine/openclaw:latest
    container_name: openclaw-init
    user: root
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        chown -R node:node /home/node/.openclaw
        mkdir -p /home/node/.openclaw
        if [ ! -f /home/node/.openclaw/openclaw.json ]; then
          SERVER_IP=$(curl -s --max-time 5 ifconfig.me)
          echo "{\"gateway\":{\"bind\":\"lan\",\"controlUi\":{\"allowedOrigins\":[\"http://${SERVER_IP}:18789\"]}}}" > /home/node/.openclaw/openclaw.json
        fi
        chown -R node:node /home/node/.openclaw
    volumes:
      - openclaw-config:/home/node/.openclaw

  openclaw:
    image: alpine/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    network_mode: host
    depends_on:
      openclaw-init:
        condition: service_completed_successfully
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OLLAMA_API_KEY=ollama-local
      - OLLAMA_HOST=http://127.0.0.1:11434
    volumes:
      - openclaw-config:/home/node/.openclaw
    mem_limit: 2g
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18789/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    depends_on:
      - ollama
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sleep 5
        ollama pull llama3.2
    environment:
      - OLLAMA_HOST=http://ollama:11434

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    depends_on:
      - ollama
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - open-webui-data:/app/backend/data

volumes:
  openclaw-config:
  ollama-data:
  open-webui-data:
